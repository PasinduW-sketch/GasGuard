# Memory settings for the Gradle daemon
# Increased to 4g to provide enough headroom for compilation
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Limit the number of parallel workers to reduce peak memory consumption
# Especially helpful on machines with limited RAM
org.gradle.workers.max=2

# Enable parallel execution and build cache
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.vfs.watch=true

# Enable Configuration Cache
org.gradle.configuration-cache=true

# AndroidX and Jetifier
android.useAndroidX=true
android.enableJetifier=false

# Speed up non-critical tasks
kapt.incremental.apt=true
kotlin.incremental=true
android.nonTransitiveRClass=true

# Memory settings for Kotlin compiler daemon
kotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=1g -XX:+UseG1GC

# Workaround for "Could not connect to Kotlin compile daemon"
# Run the Kotlin compiler in-process within the Gradle daemon
kotlin.compiler.execution.strategy=in-process
